services:
  postgres:
    image: postgres:16-alpine
    container_name: helios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helios_grid
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios -d helios_grid"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: helios-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: helios-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "false"
      AUTH_ENABLED: "true"
      SECRET_BACKEND: env
      JWT_SECRET_KEY: change-me-in-production
      DATABASE_URL: postgresql+psycopg2://helios:helios@postgres:5432/helios_grid
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CORS_ALLOW_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
      CORS_ALLOW_HEADERS: "*"
      CORS_ALLOW_CREDENTIALS: "true"
      RATE_LIMIT_DEFAULT: 1000/hour
      RATE_LIMIT_AUTH: 10/minute
      RATE_LIMIT_SIMULATION: 60/minute
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/backend/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: helios-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: helios-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
      args:
        HELIOS_BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_DEV_AUTH_AUTO: "true"
        NEXT_PUBLIC_DEV_AUTH_EMAIL: dev@helios.local
        NEXT_PUBLIC_DEV_AUTH_PASSWORD: dev-pass-123
    container_name: helios-frontend
    restart: unless-stopped
    environment:
      HELIOS_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      NEXT_PUBLIC_DEV_AUTH_AUTO: "true"
      NEXT_PUBLIC_DEV_AUTH_EMAIL: dev@helios.local
      NEXT_PUBLIC_DEV_AUTH_PASSWORD: dev-pass-123
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  loadtest:
    profiles: ["loadtest"]
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: helios-loadtest
    environment:
      APP_ENV: production
      AUTH_ENABLED: "true"
      LOCUST_HOST: http://backend:8000
      LOCUST_USERNAME: loadtest@example.com
      LOCUST_PASSWORD: test-pass-123
      SIMULATION_BURST_SIZE: 100
      SIMULATION_HOUSEHOLDS: 32
      SIMULATION_RUN_STEPS: 5
      TRAINING_EPISODES: 2
      TRAINING_STEPS_PER_EPISODE: 4
      TRAINING_EVAL_EPISODES: 1
      TRAINING_WAIT_FOR_RESULT: "false"
    depends_on:
      backend:
        condition: service_healthy
    command: >
      locust -f load_tests/locustfile.py --headless -u 100 -r 10 -t 10m

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

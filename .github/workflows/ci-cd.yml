name: CI/CD

"on":
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Target environment for the deploy job
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production
      deploy_command:
        description: Optional deploy command to run after the checks pass
        required: false
        default: ""
        type: string

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run backend lint
        run: ruff check .

  lint_frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend typecheck
        run: npm run typecheck

  test_backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helios_grid
          POSTGRES_USER: helios
          POSTGRES_PASSWORD: helios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helios -d helios_grid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run backend tests
        env:
          AUTH_ENABLED: "true"
          JWT_SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql+psycopg2://helios:helios@127.0.0.1:5432/helios_grid
          REDIS_URL: redis://127.0.0.1:6379/0
          APP_ENV: test
        run: |
          pytest -q --cov=app --cov-config=.coveragerc --cov-report=term-missing

  test_frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          HELIOS_BACKEND_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_API_BASE_URL: /api/backend
        run: npm run build

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - backend
          - frontend
    defaults:
      run:
        working-directory: ${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python for backend scan
        if: matrix.target == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node for frontend scan
        if: matrix.target == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend scan tools
        if: matrix.target == 'backend'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run backend vulnerability scan
        if: matrix.target == 'backend'
        run: pip-audit -r requirements.txt

      - name: Install frontend dependencies
        if: matrix.target == 'frontend'
        run: npm ci

      - name: Run frontend vulnerability scan
        if: matrix.target == 'frontend'
        run: npm audit --audit-level=high --production

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - lint_backend
      - lint_frontend
      - test_backend
      - test_frontend
      - security_scan
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_command != ''
    environment: ${{ github.event.inputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy command
        run: ${{ github.event.inputs.deploy_command }}

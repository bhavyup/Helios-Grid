# Global project configuration for Helios-Grid
# This file provides canonical defaults that are safe to override
# via `config/agent_config.yml` or environment-specific overrides.

project_name: "helios-grid"
version: "0.1.0"
config_version: 1  # Schema version for this config format; increment on structural changes

# Logging and reproducibility
log_dir: "logs"
seed: 42  # Used for experiment reproducibility; scope depends on config loader

# Data paths (defaults used across the project)
data_paths:
  grid_topology: "data/grid_topology/sample_grid.json"
  weather_data: "data/weather_data/sample_weather.csv"
  household_data: "data/historical_energy_data/sample_consumption.csv"
  market_data: "data/market_prices/sample_prices.csv"

# Environment defaults
env:
  num_households: 10
  max_episode_steps: 1000  # CANONICAL per-episode environment horizon cap
  max_battery: 10        # Battery capacity in kWh
  time_step_hours: 1     # Simulation time resolution in hours

# Training defaults
training:
  training_steps: 1000   # CANONICAL global optimizer/gradient update budget
  episodes: 1000         # Total episodes to run
  save_interval: 50      # Checkpoint every N episodes

# Agent defaults
agents:
  default_lr: 3.0e-4     # Fallback learning rate; algorithm-specific sections below override this
  ppo:
    lr: 3.0e-4           # Overrides default_lr for PPO
    gamma: 0.99

# Market defaults
market:
  default_price: 0.3     # Default energy price in currency/kWh
  price_min: 0.1         # Minimum price in currency/kWh
  price_max: 1.0         # Maximum price in currency/kWh
